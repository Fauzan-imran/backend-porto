<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Kasir Sederhana</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f9;
        }
        .container {
            max-width: 600px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .form-group input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            background-color: #28a745;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
        }
        button:hover {
            background-color: #218838;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        table, th, td {
            border: 1px solid #ddd;
        }
        th, td {
            padding: 10px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
        .total-section {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            background: #e9ecef;
            padding: 10px;
            border-radius: 4px;
        }
        .payment-section {
            margin-top: 20px;
            border-top: 2px dashed #ccc;
            padding-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Kasir Toko Sederhana</h2>
    
    <!-- Input Barang -->
    <div class="form-group">
        <label for="namaBarang">Nama Barang</label>
        <input type="text" id="namaBarang" placeholder="Contoh: Kopi Susu">
    </div>
    <div class="form-group">
        <label for="hargaBarang">Harga Satuan (Rp)</label>
        <input type="number" id="hargaBarang" placeholder="Contoh: 15000">
    </div>
    <div class="form-group">
        <label for="jumlahBarang">Jumlah</label>
        <input type="number" id="jumlahBarang" value="1" min="1">
    </div>
    <button onclick="tambahBarang()">Tambah ke Keranjang</button>

    <!-- Daftar Keranjang -->
    <h3>Daftar Belanja</h3>
    <table>
        <thead>
            <tr>
                <th>Barang</th>
                <th>Harga</th>
                <th>Qty</th>
                <th>Subtotal</th>
            </tr>
        </thead>
        <tbody id="daftarBelanja">
            <!-- Data barang akan muncul di sini -->
        </tbody>
    </table>

    <!-- Total Harga -->
    <div class="total-section">
        Total yang Harus Dibayar: Rp <span id="totalHarga">0</span>
    </div>

    <!-- Bagian Pembayaran -->
    <div class="payment-section">
        <h3>Pembayaran</h3>
        <div class="form-group">
            <label for="uangBayar">Uang Tunai Pembeli (Rp)</label>
            <input type="number" id="uangBayar" placeholder="Masukkan jumlah uang">
        </div>
        <button onclick="hitungKembalian()" style="background-color: #007bff;">Bayar</button>
        
        <div class="total-section" style="margin-top: 15px; background-color: #d4edda; color: #155724;">
            Kembalian: Rp <span id="uangKembalian">0</span>
        </div>
    </div>
</div>

<script>
    // Array untuk menampung item di keranjang
    let keranjang = [];
    let totalHarga = 0;

    function tambahBarang() {
        const nama = document.getElementById('namaBarang').value;
        const harga = parseFloat(document.getElementById('hargaBarang').value);
        const jumlah = parseInt(document.getElementById('jumlahBarang').value);

        // Validasi input sederhana
        if (nama === '' || isNaN(harga) || isNaN(jumlah) || jumlah <= 0) {
            alert('Mohon isi semua data barang dengan benar!');
            return;
        }

        const subtotal = harga * jumlah;

        // Masukkan data ke array keranjang
        keranjang.push({ nama, harga, jumlah, subtotal });

        // Hitung ulang total keseluruhan
        totalHarga += subtotal;

        // Perbarui tampilan tabel dan total
        updateTampilan();

        // Kosongkan form input agar siap diisi barang baru
        document.getElementById('namaBarang').value = '';
        document.getElementById('hargaBarang').value = '';
        document.getElementById('jumlahBarang').value = '1';
    }

    function updateTampilan() {
        const tbody = document.getElementById('daftarBelanja');
        tbody.innerHTML = ''; // Reset isi tabel

        keranjang.forEach(item => {
            const row = `<tr>
                <td>${item.nama}</td>
                <td>Rp ${item.harga.toLocaleString('id-ID')}</td>
                <td>${item.jumlah}</td>
                <td>Rp ${item.subtotal.toLocaleString('id-ID')}</td>
            </tr>`;
            tbody.innerHTML += row;
        });

        document.getElementById('totalHarga').innerText = totalHarga.toLocaleString('id-ID');
    }

    function hitungKembalian() {
        const bayar = parseFloat(document.getElementById('uangBayar').value);

        if (isNaN(bayar) || bayar < totalHarga) {
            alert('Uang pembayaran tidak cukup atau belum diisi!');
            return;
        }

        const kembalian = bayar - totalHarga;
        document.getElementById('uangKembalian').innerText = kembalian.toLocaleString('id-ID');
    }
</script>

</body>
</html>
